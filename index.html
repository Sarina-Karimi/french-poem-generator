<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai poeam generator</title>
    <link rel="stylesheet" href="src/styles.css">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
</head>
<body>
    <header>
            <h1>Welcome to French poem generator </h1>
    </header>
    <div class="container">
    <main>

        <form id="poem-generator-form">
            <input type="text" 
            placeholder=
            "Enter the topic of the french poem" 
            autofocus
             required 
             autocomplete="off"
             id="userInstructions"
             class="instructions">
             <input type="submit"
             class="submit-button">
        </form>

        <div class="poem" id="poem">
        </div>
    </main>
    <footer>This project was coded by <a href="https://github.com/Sarina-Karimi" target="_blank" rel="noopener noreferrer">
        Sarina Karimi</a>
         and is open-sourced on <a href="https://github.com/Sarina-Karimi/french-poem-generator" target="_blank" rel="noopener noreferrer">
            Github</a>
          and is hosted on <a href="https://app.netlify.com/projects/ai-french-poam-generator/overview" target="_blank" rel="noopener noreferrer">
            Netlify</a>
          </footer>
          </div>
    <script src="src/index.js"></script>
</body>
</html>
